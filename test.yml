---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test
  namespace: test
  annotations:
    external-dns.alpha.kubernetes.io/hostname: test.magicloud.lan.
    # cert-manager.io/issuer: step-issuer
    # cert-manager.io/issuer-kind: StepClusterIssuer
    # cert-manager.io/issuer-group: certmanager.step.sm
    traefik.ingress.kubernetes.io/router.middlewares: test-https-redirect@kubernetescrd
spec:
  rules:
  - host: test.magicloud.lan
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myjob
            port:
              number: 80
