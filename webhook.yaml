---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: ingress-tls
  namespace: test
webhooks:
- name: "ingress-tls.magicloud.lan"
  rules:
  - apiGroups:   ["networking.k8s.io"]
    apiVersions: ["v1"]
    operations:  ["CREATE", "UPDATE"]
    resources:   ["ingresses"]
    scope:       "Namespaced"
  clientConfig:
    service:
      namespace: "test"
      name: "ingress-tls"
      path: "/ingress/mutate"
      port: 443
    caBundle: 
  admissionReviewVersions: ["v1"]
  sideEffects: None
  timeoutSeconds: 5
