apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: get-default-ingressclass
rules:
- apiGroups: [""]
  resources: ["ingressclasses"]
  verbs: ["get"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: get-default-ingressclass
  namespace: test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: get-default-ingressclass
subjects:
- kind: ServiceAccount
  name: get-default-ingressclass
  namespace: test
roleRef:
  kind: ClusterRole
  name: get-default-ingressclass
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: test
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-tls
  namespace: test
spec:
  selector:
    matchLabels:
      app: ingress-tls
  replicas: 1
  template:
    metadata:
      labels:
        app: ingress-tls
    spec:
      serviceAccountName: get-default-ingressclass
      automountServiceAccountToken: false
      containers:
      - name: ingress-tls
        image: localhost:5000/ingress-tls:test19
        args:
          - --issuer
          - namespaced:step-issuer
          - --kind
          - StepClusterIssuer
          - --group
          - certmanager.step.sm
          - -t
          - test/https-redirect
          - -c
          - /tls/tls.crt
          - -k
          - /tls/tls.key
        ports:
        - containerPort: 443
          name: ingress-tls
        volumeMounts:
        - name: tls
          mountPath: /tls
        env:
        - name: RUST_LOG
          value: DEBUG
      # securityContext:
      #   fsGroup: 1000
      volumes:
        - name: tls
          csi:
            driver: csi.cert-manager.io
            readOnly: true
            volumeAttributes:
              csi.cert-manager.io/issuer-name: step-issuer
              csi.cert-manager.io/issuer-kind: StepClusterIssuer
              csi.cert-manager.io/issuer-group: certmanager.step.sm
              csi.cert-manager.io/dns-names: ingress-tls.test.svc,ingress-tls.test.svc.cluster.local
              csi.cert-manager.io/duration: 24h
              csi.cert-manager.io/renew-before: 1h
              csi.cert-manager.io/fs-group: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: ingress-tls
  namespace: test
spec:
  selector:
    app: ingress-tls
  type: ClusterIP
  ports:
  - name: ingress-tls
    protocol: TCP
    port: 443
    targetPort: ingress-tls
---
